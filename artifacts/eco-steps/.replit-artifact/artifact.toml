kind = "web"
previewPath = "/"
title = "EcoSteps"
version = "1.0.0"
id = "artifacts/eco-steps"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20936

[services.development]
run = "pnpm --filter @workspace/eco-steps run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eco-steps", "run", "build" ]
publicDir = "artifacts/eco-steps/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20936"
BASE_PATH = "/"
